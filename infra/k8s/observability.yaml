---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: ds-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: datasource-config
              mountPath: /etc/grafana/provisioning/datasources/prometheus.yml
              subPath: prometheus.yml
            - name: dashboard-provider-config
              mountPath: /etc/grafana/provisioning/dashboards/dashboard.yml
              subPath: dashboard.yml
            - name: dashboard-config
              mountPath: /var/lib/grafana/dashboards/node-service-dashboard.json
              subPath: node-service-dashboard.json
      volumes:
        - name: datasource-config
          configMap:
            name: grafana-datasources
        - name: dashboard-provider-config
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard-config
          configMap:
            name: grafana-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: ds-system
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
