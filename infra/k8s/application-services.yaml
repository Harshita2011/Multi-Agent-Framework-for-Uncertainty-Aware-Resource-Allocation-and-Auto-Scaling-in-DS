apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-service-1
  namespace: ds-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-service-1
  template:
    metadata:
      labels:
        app: node-service-1
    spec:
      containers:
        - name: node-service
          image: node-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ID
              value: node-1
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: node-service-1
  namespace: ds-system
spec:
  selector:
    app: node-service-1
  ports:
    - port: 8000
      targetPort: 8000
---
